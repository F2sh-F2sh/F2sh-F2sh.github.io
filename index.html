<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Fisch</title>

  <style>
    body {
      background-image: url("bg1P.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;

      min-height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      color: black;
    }

    nav {
      display: flex;
      gap: 10px;
      padding: 15px 30px;
      background-color: rgba(0, 0, 0, 0.2);
    }

    nav a {
      color: white;
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 6px;
    }

    nav a:hover,
    nav a.active {
      background-color: #50C878;
    }

    main {
      max-width: 1000px;
      margin: auto;
      padding: 30px;
      background-color: transparent;
    }

    iframe {
      max-width: 100%;
    }
    .dropdown {
      position: relative;
    }

    .projects-button {
      background: none;
      border: none;
      color: white;
      padding: 10px 18px;
      font-size: 16px;
      cursor: pointer;
    }

    .project-links {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      min-width: 150px;
      background-color: #222;
      z-index: 100;
    }

    .project-links a {
      display: block;
      padding: 12px 16px;
      color: white;
      text-decoration: none;
    }

    .project-links a:hover {
      background-color: #50C878;
    }

    .dropdown:hover .project-links {
      display: block;
    }
  </style>
</head>

<body>
  <nav>
    <a class="active" href="index.html">Home</a>
    <a href="hedgy.html">Hedgy Lore</a>
    <a href="game.html">Game</a>
  </nav>

  <main>
    
    <marquee scrollamount="16"><h1><span>WAAAAHHHHHHH</span></h1></marquee>
    <h2>Welcome to my homepage</h2>

    <h3>The tabs indicate projects of mine, make yourself feel at home!</h3>

    <div class="dropdown">
      <button class="projects-button">Projects ▼</button>

      <div class="project-links">
        <a href="project1.html">Example 1</a>
        <a href="project2.html">Example 2</a>
      </div>
    </div>
  </main>
</body>
</html>
