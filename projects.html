<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Projections</title>

  <style>
    body {
      background-image: url("PB.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;

      min-height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      color: black;
    }

    nav {
      display: flex;
      gap: 10px;
      padding: 15px 30px;
      background-color: rgba(0, 0, 0, 0.2);
    }

    nav a {
      color: white;
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 6px;
    }

    nav a:hover,
    nav a.active {
      background-color: #E3A32C;
    }

    main {
      width: 100%;
      max-width: none;
      box-sizing: border-box;
      padding: 30px 60px;
    }

    iframe {
      max-width: 100%;
    }

    <!-- Experimental code -->

    .projects-grid {
      display: grid;
      grid-template-columns: auto auto;
      justify-content: space-between;
      gap: 40px;
      width: 100%;
    }

    .project-card {
      background-color: rgba(227, 163, 44, 0.85);
      border: 2px solid #E3A32C;
      border-radius: 14px;
      padding: 20px;
      width: 350px;
      max-width: 100%;
      aspect-ratio: 4 / 3;
      box-sizing: border-box;
    }

    .project-card:hover {
      transform: translateY(-6px);
    }

    .project-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 10px;
    }

    .project-card h2 {
      margin-bottom: 8px;
    }

    .project-card p {
      line-height: 1.5;
    }

    .project-card a {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 18px;
      background-color: #E3A32C;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }

    .project-card a:hover {
      background-color: #E3A32C;
    }

    @media (max-width: 700px) {
      .projects-grid {
        grid-template-columns: 1fr;
      }
    }

    .full-marquee {
      display: block;
      width: 100%;
    }
    
  </style>
</head>

<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="hedgy.html">Hedgy Lore</a>
    <a href="game.html">Game</a>
    <a class="active" href="projects.html">Projects</a>
  </nav>

  <marquee scrollamount="16"> <h1><span>The many projects I have created</span></h1> </marquee>
  
  <main>

    <div class="projects-grid">

      <div class="project-card">
        <img src="project1.png" alt="Project 1 preview">
        <h2>The Sandevistan</h2>
        <p>Modeled after the Cyberpunk: Edgerunners cybernetic upgrade found by the main character, Daviid Martinez.</p>
      </div>

      <div class="project-card">
        <img src="project2.png" alt="Project 2">
        <h2>Project Two</h2>
        <p>Description of project two.</p>
      </div>

    </div>
  </main>
</body>
</html>
